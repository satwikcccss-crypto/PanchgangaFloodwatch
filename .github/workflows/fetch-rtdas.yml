name: Fetch RTDAS River Levels

on:
  schedule:
    - cron: '*/15 * * * *'  # Run every 15 minutes
  workflow_dispatch:       # Allow manual run

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest RTDAS data
        run: |
          python balinga_fetcher.py

      - name: Commit and push data updates
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          # Stage the CSV and JSON files
          git add public/balinga_river_levels.csv public/rtdas.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: update RTDAS water levels" && git push)
